<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Tutor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
    }
    #app {
      width: 900px;
      background: #1a1a2e;
      border-radius: 10px;
      overflow: hidden;
      outline: none;
      user-select: none;
    }

    /* ── Top Bar ── */
    #topbar {
      background: #111122;
      padding: 9px 18px;
      display: flex;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid #2a2a3e;
      flex-wrap: wrap;
    }
    .wpm-badge { display: flex; align-items: baseline; gap: 3px; }
    .wpm-num   { font-size: 20px; font-weight: 700; color: #e0e0e0; font-family: sans-serif; }
    .wpm-label { font-size: 9px; color: #888; font-family: sans-serif; vertical-align: super; }
    .wpm-status{ font-size: 11px; color: #4ade80; font-family: sans-serif; }
    .sep       { color: #333; margin: 0 2px; }
    #start-pill {
      background: #2a2a3e;
      border: 1px solid #3a3a5e;
      color: #ccc;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .15s;
    }
    #start-pill:hover { background: #3a3a5e; }
    #kb-toggle {
      background: #2a2a3e;
      border: 1px solid #3a3a5e;
      color: #ccc;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      font-family: sans-serif;
      transition: background .15s;
    }
    #kb-toggle:hover { background: #3a3a5e; }
    #kb-toggle.kb-off { opacity: 0.45; }
    #kb-area { transition: max-height 0.2s ease, padding 0.2s ease; overflow: hidden; }
    #kb-area.hidden { max-height: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important; }

    /* ── Upload Bar ── */
    #upload-bar {
      background: #0e0e1c;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2a2a3e;
      flex-wrap: wrap;
    }
    #upload-bar label {
      font-family: sans-serif;
      font-size: 11px;
      color: #888;
      white-space: nowrap;
    }
    #file-input { display: none; }
    #upload-btn {
      background: #1e1e3a;
      border: 1px dashed #3a3a6e;
      color: #7a8aaa;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-family: sans-serif;
      transition: background .15s, border-color .15s;
      display: flex; align-items: center; gap: 6px;
    }
    #upload-btn:hover { background: #252545; border-color: #5DCAA5; color: #5DCAA5; }
    #file-info {
      font-family: sans-serif; font-size: 11px;
      color: #5DCAA5; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #file-err {
      font-family: sans-serif; font-size: 11px;
      color: #ef4444;
    }
    /* chunk nav */
    #chunk-nav {
      margin-left: auto;
      display: none;
      align-items: center;
      gap: 8px;
      font-family: sans-serif; font-size: 11px; color: #888;
    }
    #chunk-nav.visible { display: flex; }
    .chunk-btn {
      background: #1e1e3a; border: 1px solid #3a3a5e;
      color: #ccc; padding: 3px 11px; border-radius: 5px;
      font-size: 11px; cursor: pointer; font-family: sans-serif;
      transition: background .12s;
    }
    .chunk-btn:hover { background: #2a2a4e; }
    .chunk-btn:disabled { opacity: .35; cursor: default; }

    /* ── Progress Bar ── */
    #progress  { height: 3px; background: #2a2a3e; }
    #prog-fill { height: 3px; background: #5DCAA5; width: 0; transition: width .15s; }

    /* ── Text Area ── */
    #text-area {
      padding: 32px 40px 28px;
      position: relative;
    }
    #text-display {
      font-size: 28px;
      line-height: 2;
      letter-spacing: 0.04em;
      display: block;
      width: 100%;
      word-break: break-word;
      white-space: normal;
      text-align: left;
    }
    .word { display: inline-block; white-space: nowrap; }
    .word-space { display: inline; }
    .c-pending { color: #4a5568; }
    .c-done    { color: #5DCAA5; }
    .c-err     { color: #ef4444; }
    .c-cursor  {
      color: #e2e8f0;
      position: relative;
    }
    .c-cursor::before {
      content: '';
      position: absolute;
      left: -1px;
      top: 0.1em;
      bottom: 0.1em;
      width: 2px;
      background: #5DCAA5;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Overlays ── */
    .overlay-base {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
    }
    #overlay { background: rgba(10,10,20,.55); z-index: 5; }
    #overlay-btn {
      background: #5DCAA5; color: #0a2a20; border: none;
      padding: 11px 30px; border-radius: 6px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: sans-serif; letter-spacing: .06em;
      transition: background .15s;
    }
    #overlay-btn:hover { background: #4ab891; }
    #done-wrap { background: rgba(10,10,20,.88); z-index: 6; display: none; }
    #done-wrap.show { display: flex; }
    #done-wrap h2 { color: #5DCAA5; font-family: sans-serif; font-size: 22px; }
    #done-wrap p  { color: #aaa; font-family: sans-serif; font-size: 14px; }
    .done-actions { display: flex; gap: 10px; margin-top: 4px; }
    .done-btn {
      border: none; padding: 9px 22px; border-radius: 5px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: sans-serif; transition: background .15s;
    }
    #retry-btn  { background: #5DCAA5; color: #0a2a20; }
    #retry-btn:hover { background: #4ab891; }
    #next-chunk-done {
      background: #2a3a5e; color: #90c0ff;
      border: 1px solid #3a5a8e;
      display: none;
    }
    #next-chunk-done.visible { display: block; }
    #next-chunk-done:hover { background: #3a4a6e; }

    /* ── PDF loading overlay ── */
    #pdf-loading {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,10,20,.75);
      z-index: 99;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    #pdf-loading.show { display: flex; }
    #pdf-loading p { color: #5DCAA5; font-family: sans-serif; font-size: 14px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a2a4e;
      border-top-color: #5DCAA5;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Keyboard ── */
    #kb-area {
      background: #111122;
      padding: 14px 16px 20px;
      border-top: 1px solid #2a2a3e;
    }
    .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
    .key {
      min-width: 34px; height: 36px;
      background: #1e1e2e; border: 1px solid #2e2e4e; border-radius: 5px;
      color: #777; font-size: 11px; font-family: sans-serif;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; cursor: default;
      transition: background .08s, color .08s, border-color .08s;
    }
    .key .top { font-size: 8px; color: #444; line-height: 1; }
    .key.wide    { min-width: 58px; }
    .key.wider   { min-width: 76px; }
    .key.space   { min-width: 210px; }
    .key.shift-l, .key.shift-r { min-width: 76px; }
    .key.hl { background: #0e3a30; border-color: #5DCAA5; color: #5DCAA5; }
    .key.hl .top { color: #2a8a70; }
    .key.pressed { background: #5DCAA5; color: #0a2a20; border-color: #5DCAA5; }
  </style>
</head>
<body>
<div id="app" tabindex="0">

  <!-- Top Bar -->
  <div id="topbar">
    <div class="wpm-badge">
      <span class="wpm-label">wpm</span>
      <span class="wpm-num" id="wpm1">0</span>
      <span class="sep">|</span>
      <span class="wpm-status" id="acc-label">Good</span>
    </div>
    <div class="wpm-badge">
      <span class="wpm-num" id="wpm2">0</span>
      <span class="wpm-label">wpm</span>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:14px;font-family:sans-serif;font-size:12px;color:#666;">
      <span>ACC: <span id="acc-pct" style="color:#e2e8f0;">100%</span></span>
      <span>TIME: <span id="time-el" style="color:#e2e8f0;">0:00</span></span>
    </div>
    <button id="start-pill">
      <span style="font-size:13px;color:#aaa;">&#9646;&#9646;</span> Start Typing
    </button>
    <button id="kb-toggle" title="Toggle keyboard">
      <span id="kb-toggle-icon">⌨</span>
    </button>
  </div>

  <!-- Upload Bar -->
  <div id="upload-bar">
    <label>Upload teks:</label>
    <button id="upload-btn" onclick="document.getElementById('file-input').click()">
      &#128196; Pilih file .txt / .pdf
    </button>
    <input type="file" id="file-input" accept=".txt,.pdf" />
    <span id="file-info"></span>
    <span id="file-err"></span>
    <div id="chunk-nav">
      <button class="chunk-btn" id="prev-btn">&#8592; Prev</button>
      <span id="chunk-label">Bagian 1 / 1</span>
      <button class="chunk-btn" id="next-btn">Next &#8594;</button>
    </div>
  </div>

  <div id="progress"><div id="prog-fill"></div></div>

  <!-- Text Area -->
  <div id="text-area">
    <div id="text-display"></div>
    <div class="overlay-base" id="overlay">
      <button id="overlay-btn">&#9654; Start Typing</button>
    </div>
    <div class="overlay-base" id="done-wrap">
      <h2 id="done-h">Bagian selesai!</h2>
      <p id="done-p"></p>
      <div class="done-actions">
        <button class="done-btn" id="retry-btn">&#8635; Ulangi</button>
        <button class="done-btn" id="next-chunk-done">Lanjut &#8594;</button>
      </div>
    </div>
  </div>

  <div id="kb-area"><div id="keyboard"></div></div>
</div>

<!-- PDF loading overlay (outside #app so z-index works) -->
<div id="pdf-loading">
  <div class="spinner"></div>
  <p>Memproses PDF…</p>
</div>

<!-- pdf.js CDN -->

async function loadAudioBuf(dataUrl) {
  const resp = await fetch(dataUrl);
  const arrBuf = await resp.arrayBuffer();
  return await actx.decodeAudioData(arrBuf);
}

function ensureAudio() {
  if (!actx) {
    actx = new AudioCtx();
    // preload buffers async (fire and forget — ready quickly)
    loadAudioBuf(BENAR_SND).then(b => { benarBuf = b; }).catch(()=>{});
    loadAudioBuf(SALAH_SND).then(b => { salahBuf = b; }).catch(()=>{});
  }
  if (actx.state === 'suspended') actx.resume();
}

function playClick(isError) {
  if (!actx) return;
  const buf = isError ? salahBuf : benarBuf;
  if (!buf) return;
  const src = actx.createBufferSource();
  src.buffer = buf;
  // slight pitch randomization for variety
  src.playbackRate.value = 0.92 + Math.random() * 0.16;
  const gain = actx.createGain();
  gain.gain.value = isError ? 0.85 : 0.95;
  src.connect(gain);
  gain.connect(actx.destination);
  src.start();
}

/* ══════════════════════════════════════════════════
   TEXT MANAGEMENT & CHUNKS
   ══════════════════════════════════════════════════ */
let fullText    = DEFAULT_TEXT;   // seluruh teks yang diload
let chunks      = [];             // array potongan teks
let chunkIndex  = 0;              // chunk aktif

/**
 * sanitizeText: hapus karakter non-printable, normalkan whitespace,
 * batasi panjang — semua dijalankan di sisi klien sebelum digunakan.
 */
function sanitizeText(raw) {
  // Normalisasi karakter tipografi Unicode → ASCII ketik-able
  let clean = raw
    .replace(/\u2026/g, '...')          // … → ...
    .replace(/[\u2018\u2019]/g, "'")   // ' ' → '
    .replace(/[\u201C\u201D]/g, '"')   // " " → "
    .replace(/\u2013/g, '-')            // – → -
    .replace(/\u2014/g, '--')           // — → --
    .replace(/\u00A0/g, ' ');           // non-breaking space → space
  // Hanya izinkan karakter printable ASCII
  // eslint-disable-next-line no-control-regex
  clean = clean.replace(/[^\x09\x0A\x0D\x20-\x7E]/g, '');
  // Normalisasi baris & spasi berulang
  clean = clean.replace(/\r\n/g, ' ').replace(/[\r\n]+/g, ' ');
  clean = clean.replace(/[ \t]+/g, ' ');           // spasi ganda → satu
  clean = clean.trim();
  // Batasi panjang
  if (clean.length > MAX_TEXT_CHARS) {
    clean = clean.slice(0, MAX_TEXT_CHARS);
    // jangan potong di tengah kata
    const lastSpace = clean.lastIndexOf(' ');
    if (lastSpace > MAX_TEXT_CHARS * 0.9) clean = clean.slice(0, lastSpace);
  }
  return clean;
}

/**
 * splitChunks: potong teks menjadi chunk CHUNK_SIZE karakter,
 * selalu memotong di batas kata supaya tidak mid-word.
 */
function splitChunks(text) {
  const result = [];
  let pos = 0;
  while (pos < text.length) {
    let end = Math.min(pos + CHUNK_SIZE, text.length);
    if (end < text.length) {
      // mundur ke batas kata terdekat
      let ws = end;
      while (ws > pos && text[ws] !== ' ') ws--;
      if (ws > pos) end = ws;
    }
    result.push(text.slice(pos, end).trim());
    pos = end + 1;
  }
  return result.filter(c => c.length > 0);
}

function loadText(text) {
  fullText   = sanitizeText(text);
  chunks     = splitChunks(fullText);
  chunkIndex = 0;
  updateChunkNav();
  loadChunk(0);
}

function loadChunk(idx) {
  chunkIndex = idx;
  updateChunkNav();
  resetSession(chunks[idx] || DEFAULT_TEXT);
}

function updateChunkNav() {
  const nav = document.getElementById('chunk-nav');
  if (chunks.length > 1) {
    nav.classList.add('visible');
    document.getElementById('chunk-label').textContent =
      'Bagian ' + (chunkIndex + 1) + ' / ' + chunks.length;
    document.getElementById('prev-btn').disabled = chunkIndex === 0;
    document.getElementById('next-btn').disabled = chunkIndex >= chunks.length - 1;
    // tombol "Lanjut" di done overlay
    const ncd = document.getElementById('next-chunk-done');
    if (chunkIndex < chunks.length - 1) ncd.classList.add('visible');
    else ncd.classList.remove('visible');
  } else {
    nav.classList.remove('visible');
    document.getElementById('next-chunk-done').classList.remove('visible');
  }
}

/* ══════════════════════════════════════════════════
   FILE UPLOAD — SECURITY VALIDATIONS
   ══════════════════════════════════════════════════ */
function setFileErr(msg) {
  document.getElementById('file-err').textContent  = msg;
  document.getElementById('file-info').textContent = '';
}
function setFileInfo(msg) {
  document.getElementById('file-info').textContent = msg;
  document.getElementById('file-err').textContent  = '';
}

function validateFile(file) {
  /* 1. Validasi ekstensi (tidak hanya MIME — mudah dipalsukan) */
  const name = file.name.toLowerCase();
  const ext  = name.slice(name.lastIndexOf('.'));
  if (!ALLOWED_EXTS.includes(ext)) {
    return 'Format tidak didukung. Hanya .txt dan .pdf.';
  }
  /* 2. Validasi MIME type */
  if (file.type && !ALLOWED_TYPES.includes(file.type) && file.type !== '') {
    // pdf.js kadang mendeteksi 'application/octet-stream' untuk PDF yang valid,
    // jadi kita biarkan lolos jika ekstensi .pdf
    if (!(ext === '.pdf')) {
      return 'Tipe file tidak valid.';
    }
  }
  /* 3. Validasi ukuran */
  if (file.size > MAX_FILE_BYTES) {
    return 'File terlalu besar (maks 10 MB).';
  }
  if (file.size === 0) {
    return 'File kosong.';
  }
  return null; // OK
}

document.getElementById('file-input').addEventListener('change', async function () {
  const file = this.files[0];
  if (!file) return;
  this.value = ''; // reset supaya file yang sama bisa diupload ulang

  const err = validateFile(file);
  if (err) { setFileErr(err); return; }

  const name = file.name.toLowerCase();
  const ext  = name.slice(name.lastIndexOf('.'));

  if (ext === '.txt') {
    await handleTxt(file);
  } else if (ext === '.pdf') {
    await handlePdf(file);
  }
});

async function handleTxt(file) {
  try {
    const reader = new FileReader();
    reader.onload = (e) => {
      const raw = e.target.result;
      /* Cegah file yang sangat besar menyebabkan hang */
      if (typeof raw !== 'string') { setFileErr('Gagal membaca file.'); return; }
      loadText(raw);
      saveUploadedText(raw, file.name); // simpan teks ke localStorage
      setFileInfo('✓ ' + escapeHtmlAttr(file.name) +
        '  (' + chunks.length + ' bagian)');
    };
    reader.onerror = () => setFileErr('Gagal membaca file teks.');
    reader.readAsText(file, 'UTF-8');
  } catch (e) {
    setFileErr('Terjadi kesalahan saat membaca file.');
  }
}

async function handlePdf(file) {
  const loading = document.getElementById('pdf-loading');
  loading.classList.add('show');
  try {
    const arrayBuffer = await file.arrayBuffer();

    /* Validasi magic bytes PDF: setiap PDF dimulai dengan %PDF */
    const magic = new Uint8Array(arrayBuffer.slice(0, 5));
    const header = String.fromCharCode(...magic);
    if (!header.startsWith('%PDF')) {
      loading.classList.remove('show');
      setFileErr('File bukan PDF yang valid.');
      return;
    }

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const pdf  = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const maxPages = Math.min(pdf.numPages, 200); // batasi 200 halaman
    let allText = '';

    for (let p = 1; p <= maxPages; p++) {
      const page    = await pdf.getPage(p);
      const content = await page.getTextContent();
      /* Ambil teks saja — abaikan gambar/elemen lain */
      const pageText = content.items
        .filter(item => typeof item.str === 'string')
        .map(item => item.str)
        .join(' ');
      allText += pageText + '\n';

      /* Stop lebih awal jika sudah melebihi batas */
      if (allText.length > MAX_TEXT_CHARS * 1.5) break;
    }

    if (!allText.trim()) {
      setFileErr('PDF tidak mengandung teks yang bisa dibaca (mungkin scan gambar).');
      loading.classList.remove('show');
      return;
    }

    loadText(allText);
    saveUploadedText(allText, file.name); // simpan teks PDF ke localStorage
    setFileInfo('✓ ' + escapeHtmlAttr(file.name) +
      '  (' + pdf.numPages + ' hal · ' + chunks.length + ' bagian)');

  } catch (e) {
    setFileErr('Gagal memproses PDF. Pastikan file tidak terpassword.');
  } finally {
    loading.classList.remove('show');
  }
}

/* Sanitize nama file untuk ditampilkan (bukan dirender sebagai HTML) */
function escapeHtmlAttr(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let chars=[], spans=[], cursor=0, started=false, errors=0, typed=0, timer=null, secs=0;

/* ══════════════════════════════════════════════════
   PERSISTENT STORAGE  (localStorage, 30 hari)
   ══════════════════════════════════════════════════ */
const STORE_KEY       = 'typingTutor_v1';
const STORE_EXPIRY_MS = 30 * 24 * 60 * 60 * 1000; // 30 hari

/* Baca seluruh state dari localStorage */
function storeLoad() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    // Cek expiry
    if (!obj.savedAt || Date.now() - obj.savedAt > STORE_EXPIRY_MS) {
      localStorage.removeItem(STORE_KEY);
      return null;
    }
    return obj;
  } catch (e) { return null; }
}

/* Simpan seluruh state ke localStorage */
function storeSave(extra) {
  try {
    const obj = storeLoad() || {};
    Object.assign(obj, extra, { savedAt: Date.now() });
    localStorage.setItem(STORE_KEY, JSON.stringify(obj));
  } catch (e) { /* quota exceeded — abaikan */ }
}

/* Hapus state dari localStorage */
function storeClear() {
  try { localStorage.removeItem(STORE_KEY); } catch(e) {}
}

/* Simpan progress chunk saat ini: chunkIndex + posisi karakter (cursor) */
function saveProgress() {
  const isUpload = (storeLoad() || {}).uploadedText != null;
  storeSave({ chunkIndex, cursorPos: cursor });
}

/* Simpan teks yang di-upload beserta nama file dan chunk index */
function saveUploadedText(text, fileName) {
  storeSave({ uploadedText: text, uploadedFileName: fileName, chunkIndex: 0, cursorPos: 0 });
}

/* Tampilkan banner pemulihan sesi */
function showResumeBanner(chunkIdx, curPos) {
  // Hapus banner lama jika ada
  const old = document.getElementById('resume-banner');
  if (old) old.remove();

  const banner = document.createElement('div');
  banner.id = 'resume-banner';
  banner.style.cssText = [
    'background:#0e2a20', 'border-bottom:1px solid #2a5a40',
    'padding:8px 18px', 'display:flex', 'align-items:center',
    'gap:12px', 'font-family:sans-serif', 'font-size:11px', 'color:#5DCAA5',
    'flex-wrap:wrap'
  ].join(';');

  const info = document.createElement('span');
  info.textContent = '💾 Sesi tersimpan ditemukan — Bagian ' + (chunkIdx + 1) +
    ', posisi ' + curPos + ' karakter.';

  const btnResume = document.createElement('button');
  btnResume.textContent = '▶ Lanjutkan';
  btnResume.style.cssText = 'background:#1e4a30;border:1px solid #3a8a60;color:#5DCAA5;' +
    'padding:4px 14px;border-radius:5px;font-size:11px;cursor:pointer;font-family:sans-serif;';
  btnResume.onclick = () => {
    banner.remove();
    resumeSession(chunkIdx, curPos);
  };

  const btnDiscard = document.createElement('button');
  btnDiscard.textContent = '✕ Mulai baru';
  btnDiscard.style.cssText = 'background:transparent;border:1px solid #3a3a5e;color:#666;' +
    'padding:4px 14px;border-radius:5px;font-size:11px;cursor:pointer;font-family:sans-serif;';
  btnDiscard.onclick = () => {
    storeClear();
    banner.remove();
  };

  banner.appendChild(info);
  banner.appendChild(btnResume);
  banner.appendChild(btnDiscard);

  // Sisipkan setelah upload-bar
  const uploadBar = document.getElementById('upload-bar');
  uploadBar.insertAdjacentElement('afterend', banner);
}

/* Pulihkan sesi: lompat ke chunk & set cursor ke posisi tersimpan */
function resumeSession(chunkIdx, curPos) {
  // Pastikan chunk valid
  const targetChunk = chunks[chunkIdx];
  if (!targetChunk) return;

  chunkIndex = chunkIdx;
  updateChunkNav();
  currentLesson = targetChunk;

  // Build text display lalu set cursor ke posisi tersimpan
  buildTextAndSetCursor(curPos);
  document.getElementById('app').focus();
}

/* Build teks lalu tempel cursor di posisi tertentu (tanpa reset ke 0) */
function buildTextAndSetCursor(pos) {
  cursor = 0; errors = 0; secs = 0; typed = 0; started = false;
  clearInterval(timer); timer = null;
  ['wpm1','wpm2'].forEach(id => document.getElementById(id).textContent = '0');
  document.getElementById('acc-pct').textContent = '100%';
  document.getElementById('time-el').textContent = '0:00';
  document.getElementById('done-wrap').classList.remove('show');

  chars = currentLesson.split('');
  spans = [];
  const d = document.getElementById('text-display');
  d.innerHTML = '';

  let i = 0;
  while (i < chars.length) {
    if (chars[i] === ' ') {
      const sp = document.createElement('span');
      sp.className = 'word-space c-pending';
      sp.dataset.i = i;
      sp.innerHTML = '&nbsp;';
      spans[i] = sp;
      d.appendChild(sp);
      i++;
    } else {
      const wordWrap = document.createElement('span');
      wordWrap.className = 'word';
      while (i < chars.length && chars[i] !== ' ') {
        const cs = document.createElement('span');
        cs.className = 'c-pending';
        cs.dataset.i = i;
        cs.textContent = chars[i];
        spans[i] = cs;
        wordWrap.appendChild(cs);
        i++;
      }
      d.appendChild(wordWrap);
    }
  }

  // Terapkan posisi tersimpan
  cursor = Math.min(pos, chars.length);
  // Mark semua karakter sebelum cursor sebagai 'done'
  for (let j = 0; j < cursor; j++) {
    const el = spans[j];
    if (el) el.className = (el.className.includes('word-space') ? 'word-space ' : '') + 'c-done';
  }
  updateCursor();

  // Tampilkan overlay dengan teks "Lanjutkan"
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  document.getElementById('overlay-btn').textContent = '▶ Lanjutkan';
}


/* ── Build keyboard ── */
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KB_ROWS.forEach(row => {
    const rd = document.createElement('div');
    rd.className = 'kb-row';
    row.forEach(([lbl, key, extra]) => {
      const k = document.createElement('div');
      k.className = 'key ' + (extra || '');
      k.dataset.key = key;
      k.textContent = lbl;
      rd.appendChild(k);
    });
    kb.appendChild(rd);
  });
}

/* ── Build text display ── */
function buildText() {
  chars = currentLesson.split('');
  spans = [];
  const d = document.getElementById('text-display');
  d.innerHTML = '';

  let i = 0;
  while (i < chars.length) {
    if (chars[i] === ' ') {
      const sp = document.createElement('span');
      sp.className = 'word-space c-pending';
      sp.dataset.i = i;
      sp.innerHTML = '&nbsp;';
      spans[i] = sp;
      d.appendChild(sp);
      i++;
    } else {
      const wordWrap = document.createElement('span');
      wordWrap.className = 'word';
      while (i < chars.length && chars[i] !== ' ') {
        const cs = document.createElement('span');
        cs.className = 'c-pending';
        cs.dataset.i = i;
        cs.textContent = chars[i];
        spans[i] = cs;
        wordWrap.appendChild(cs);
        i++;
      }
      d.appendChild(wordWrap);
    }
  }
  updateCursor();
}

/* ── Sync styles & progress ── */
function updateCursor() {
  spans.forEach((el, i) => {
    if (i < cursor) {
      el.className = (el.className.includes('word-space') ? 'word-space ' : '') +
                     (el.dataset.err ? 'c-err' : 'c-done');
    } else if (i === cursor) {
      el.className = (el.className.includes('word-space') ? 'word-space ' : '') + 'c-cursor';
    } else {
      el.className = (el.className.includes('word-space') ? 'word-space ' : '') + 'c-pending';
    }
  });
  document.getElementById('prog-fill').style.width = (cursor / chars.length * 100) + '%';
  if (cursor < chars.length) highlightKey(chars[cursor]);
}

/* ── Highlight next key ── */
function highlightKey(ch) {
  const lower = ch.toLowerCase();
  const isShift = ch !== lower && /[A-Z!@#$%^&*()_+{}|:"<>?~]/.test(ch);
  document.querySelectorAll('.key').forEach(k => {
    k.classList.remove('hl');
    const kk = k.dataset.key;
    if (kk && (kk === lower || kk === ch)) k.classList.add('hl');
    if (isShift && kk === 'Shift') k.classList.add('hl');
  });
}

/* ── Flash pressed key ── */
function flashKey(ch) {
  document.querySelectorAll('.key').forEach(k => {
    if (k.dataset.key === ch.toLowerCase() || k.dataset.key === ch) {
      k.classList.add('pressed');
      setTimeout(() => k.classList.remove('pressed'), 120);
    }
  });
}

/* ── Timer ── */
function startTimer() {
  if (timer) return;
  timer = setInterval(() => {
    secs++;
    const m = Math.floor(secs / 60), s = secs % 60;
    document.getElementById('time-el').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    const wpm = Math.round((cursor / 5) / (secs / 60)) || 0;
    document.getElementById('wpm1').textContent = wpm;
    document.getElementById('wpm2').textContent = wpm;
    updateAccLabel();
  }, 1000);
}

/* ── Accuracy label ── */
function updateAccLabel() {
  const acc = typed > 0 ? Math.max(0, Math.round((1 - errors / typed) * 100)) : 100;
  document.getElementById('acc-pct').textContent = acc + '%';
  const lbl = acc >= 95 ? 'Excellent' : acc >= 85 ? 'Good' : acc >= 70 ? 'OK' : 'Keep going';
  const col = acc >= 95 ? '#4ade80' : acc >= 85 ? '#86efac' : acc >= 70 ? '#fbbf24' : '#f87171';
  document.getElementById('acc-label').textContent = lbl;
  document.getElementById('acc-label').style.color  = col;
}

/* ── Keydown handler ── */
function handleKey(e) {
  e.preventDefault();
  ensureAudio(); // ensure AudioContext is alive on any keypress
  if (!started) {
    if (e.key.length === 1 || e.key === 'Backspace') {
      started = true;
      document.getElementById('overlay').style.display = 'none';
      startTimer();
    } else return;
  }
  if (e.key === 'Backspace') {
    if (cursor > 0) { cursor--; delete spans[cursor].dataset.err; }
    playClick(false);
    updateCursor(); return;
  }
  if (e.key.length !== 1) return;

  // Ignore modifier-combined single chars (e.g. Ctrl+C fires e.key='c' length 1)
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  const expected = chars[cursor];

  // If expected char is space, ONLY ' ' (Space key) is correct
  if (expected === ' ' && e.key !== ' ') {
    // Wrong key pressed instead of space — mark error but don't advance
    // Actually advance with error so user must re-try via backspace
    typed++;
    errors++;
    spans[cursor].dataset.err = '1';
    flashKey(e.key);
    playClick(true);
    cursor++;
    updateCursor();
    updateAccLabel();
    return;
  }

  typed++;
  if (e.key === expected) {
    flashKey(expected);
    playClick(false);
    cursor++;
  } else {
    errors++;
    spans[cursor].dataset.err = '1';
    flashKey(e.key);
    playClick(true);
    cursor++;
  }

  if (cursor >= chars.length) {
    clearInterval(timer);
    const wpm = Math.round((chars.length / 5) / (secs / 60)) || 0;
    const acc = Math.max(0, Math.round((1 - errors / typed) * 100));
    const isLast = chunkIndex >= chunks.length - 1;
    document.getElementById('done-h').textContent =
      isLast ? 'Selesai!' : 'Bagian ' + (chunkIndex + 1) + ' selesai!';
    document.getElementById('done-p').textContent =
      wpm + ' WPM  ·  ' + acc + '% akurasi  ·  ' +
      Math.floor(secs/60) + ':' + (secs%60 < 10 ? '0' : '') + secs%60;
    document.getElementById('done-wrap').classList.add('show');
  }
  updateCursor();
  updateAccLabel();
  saveProgress(); // simpan posisi ke localStorage
}

/* ── Reset session (tanpa ganti teks) ── */
function resetSession(lessonText) {
  currentLesson = lessonText || currentLesson;
  cursor=0; errors=0; secs=0; typed=0; started=false;
  clearInterval(timer); timer=null;
  ['wpm1','wpm2'].forEach(id => document.getElementById(id).textContent = '0');
  document.getElementById('acc-pct').textContent = '100%';
  document.getElementById('time-el').textContent = '0:00';
  document.getElementById('done-wrap').classList.remove('show');
  document.getElementById('overlay').style.display = 'flex';
  buildText();
  document.getElementById('app').focus();
}

function reset() {
  // Reset progress untuk chunk ini ke 0, tapi pertahankan uploadedText
  const saved = storeLoad();
  if (saved) storeSave({ chunkIndex, cursorPos: 0 });
  resetSession(chunks.length > 0 ? chunks[chunkIndex] : DEFAULT_TEXT);
}

/* ── Events ── */
function startGame() {
  ensureAudio();
  started = true;
  document.getElementById('overlay').style.display = 'none';
  startTimer();
  document.getElementById('app').focus();
}

document.getElementById('overlay-btn').addEventListener('click', startGame);
document.getElementById('start-pill').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', reset);
document.getElementById('app').addEventListener('keydown', handleKey);
document.getElementById('app').addEventListener('click', () => document.getElementById('app').focus());

document.getElementById('prev-btn').addEventListener('click', () => {
  if (chunkIndex > 0) loadChunk(chunkIndex - 1);
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (chunkIndex < chunks.length - 1) loadChunk(chunkIndex + 1);
});
document.getElementById('next-chunk-done').addEventListener('click', () => {
  if (chunkIndex < chunks.length - 1) {
    storeSave({ chunkIndex: chunkIndex + 1, cursorPos: 0 });
    loadChunk(chunkIndex + 1);
  }
});

/* ── Init ── */
buildKeyboard();

/* Cek localStorage — pulihkan sesi tersimpan jika ada */
(function initWithStorage() {
  const saved = storeLoad();

  if (saved && saved.uploadedText) {
    // Ada file upload tersimpan — muat teks dulu
    fullText   = sanitizeText(saved.uploadedText);
    chunks     = splitChunks(fullText);
    chunkIndex = 0;
    updateChunkNav();

    const ci  = Math.min(saved.chunkIndex || 0, chunks.length - 1);
    const pos = saved.cursorPos || 0;

    // Tampilkan nama file
    if (saved.uploadedFileName) {
      setFileInfo('💾 ' + escapeHtmlAttr(saved.uploadedFileName) +
        '  (' + chunks.length + ' bagian) — tersimpan');
    }

    if (pos > 0 || ci > 0) {
      // Ada progress tersimpan — tunjukkan banner
      chunkIndex = ci;
      currentLesson = chunks[ci];
      resetSession(chunks[ci]);
      showResumeBanner(ci, pos);
    } else {
      resetSession(chunks[0]);
    }

  } else if (saved && (saved.chunkIndex > 0 || saved.cursorPos > 0)) {
    // Default text dengan progress tersimpan
    chunks = [DEFAULT_TEXT];
    chunkIndex = 0;
    resetSession(DEFAULT_TEXT);
    showResumeBanner(saved.chunkIndex || 0, saved.cursorPos || 0);

  } else {
    // Tidak ada data tersimpan — mulai normal
    chunks = [DEFAULT_TEXT];
    chunkIndex = 0;
    resetSession(DEFAULT_TEXT);
  }
})();

/* ── Keyboard toggle ── */
let kbVisible = true;
const kbArea = document.getElementById('kb-area');
const kbToggle = document.getElementById('kb-toggle');
kbToggle.addEventListener('click', () => {
  kbVisible = !kbVisible;
  if (kbVisible) {
    kbArea.classList.remove('hidden');
    kbToggle.classList.remove('kb-off');
    kbToggle.title = 'Sembunyikan keyboard';
  } else {
    kbArea.classList.add('hidden');
    kbToggle.classList.add('kb-off');
    kbToggle.title = 'Tampilkan keyboard';
  }
  document.getElementById('app').focus();
});
</script>
